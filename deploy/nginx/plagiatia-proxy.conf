#=================================================================================
# PlagiatIA - Proxy Snippet pour Nginx
# Ce fichier est inclus dans la configuration principale avec:
#   include /etc/nginx/snippets/plagiatia-proxy.conf;
#
# Installation:
#   sudo cp plagiatia-proxy.conf /etc/nginx/snippets/
#   sudo chmod 644 /etc/nginx/snippets/plagiatia-proxy.conf
#=================================================================================

# Version HTTP (1.1 requise pour WebSocket/Upgrade)
proxy_http_version 1.1;

# Support WebSocket (Service Worker, notifications temps réel)
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection 'upgrade';

# Headers de forwarding (pour que Next.js connaisse l'origine)
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Request-ID $request_id;

# Timeouts optimisés pour Next.js/Bun
proxy_connect_timeout 60s;      # Temps pour établir la connexion au backend
proxy_send_timeout 300s;        # Temps d'envoi vers le backend
proxy_read_timeout 300s;        # Temps de lecture depuis le backend

# Configuration des buffers
proxy_buffering on;             # Activer le buffering des réponses
proxy_buffer_size 4k;           # Taille du buffer pour les headers
proxy_buffers 8 4k;             # Nombre et taille des buffers
proxy_busy_buffers_size 8k;     # Taille max pendant l'envoi au client

# Désactiver le buffering des requêtes (important pour les uploads chunkés)
proxy_request_buffering off;

# Passer certains headers du client (optionnel - décommentez si nécessaire)
# proxy_pass_header Authorization;
# proxy_pass_header Server;
