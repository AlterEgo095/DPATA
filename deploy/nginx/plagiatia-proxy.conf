# PlagiatIA - Proxy Snippet pour Nginx
# Ce fichier est inclus dans la configuration principale
# Installation: sudo cp plagiatia-proxy.conf /etc/nginx/snippets/

# Version HTTP/1.1 pour WebSocket et keep-alive
proxy_http_version 1.1;

# Support WebSocket (pour futures fonctionnalités temps réel)
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection 'upgrade';

# Headers de base
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Request-ID $request_id;

# Timeouts optimisés pour Next.js
proxy_connect_timeout 60s;
proxy_send_timeout 300s;
proxy_read_timeout 300s;

# Buffering des réponses
proxy_buffering on;
proxy_buffer_size 4k;
proxy_buffers 8 4k;
proxy_busy_buffers_size 8k;
proxy_temp_file_write_size 64k;

# Désactiver le buffering pour les SSE (Server-Sent Events)
proxy_set_header Accept-Encoding "";

# Ignorer certains headers du backend
proxy_hide_header X-Powered-By;
