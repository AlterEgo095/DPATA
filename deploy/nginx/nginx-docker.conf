# PlagiatIA - Nginx Configuration for Docker
# Cette configuration est utilisée avec docker-compose

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Upstream pour le backend Next.js (nom du service Docker)
upstream plagiatia_backend {
    server plagiatia:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # ACME Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Toutes les autres requêtes vers le backend
    location / {
        include /etc/nginx/snippets/plagiatia-proxy.conf;
        proxy_pass http://plagiatia_backend;
    }

    # API endpoints
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;
        
        include /etc/nginx/snippets/plagiatia-proxy.conf;
        proxy_pass http://plagiatia_backend;
    }

    # Login - protection brute-force
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;
        
        include /etc/nginx/snippets/plagiatia-proxy.conf;
        proxy_pass http://plagiatia_backend;
    }

    # Uploads
    location /api/documents {
        client_max_body_size 100M;
        
        include /etc/nginx/snippets/plagiatia-proxy.conf;
        proxy_pass http://plagiatia_backend;
        
        proxy_connect_timeout 120s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Assets statiques avec cache
    location /_next/static/ {
        proxy_pass http://plagiatia_backend;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images, fonts
    location ~* \.(ico|png|jpg|jpeg|gif|webp|avif|svg|woff|woff2|ttf|otf)$ {
        proxy_pass http://plagiatia_backend;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Health check sans logs
    location /api/health {
        proxy_pass http://plagiatia_backend;
        access_log off;
    }

    # Logs
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/error.log warn;
}
