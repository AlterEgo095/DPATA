#=================================================================================
# PlagiatIA - Configuration Nginx Production
# Domaine: plagiatia.aenews.net
# Server IP: 95.111.226.63
#
# Cette configuration est optimisée pour:
# - Next.js 16 avec output: standalone (Bun runtime)
# - SSL/TLS avec HTTP/2 (Certbot/Let's Encrypt)
# - Rate limiting avancé
# - Cache agressif des assets statiques
# - Sécurité renforcée (headers, CORS, OWASP)
#
# Installation:
#   sudo cp plagiatia.aenews.net.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/plagiatia.aenews.net.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (après avoir pointé le domaine):
#   sudo certbot --nginx -d plagiatia.aenews.net --email admin@aenews.net
#=================================================================================

#===============================================================================
# ZONES DE RATE LIMITING
#===============================================================================

# API générale: 100 requêtes/seconde par IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

# Login: 5 requêtes/minute (protection brute-force)
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# Upload: 10 requêtes/5 minutes
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/5m;

# Connexions simultanées: max 25 par IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

#===============================================================================
# UPSTREAM - Backend Next.js (Bun)
#===============================================================================

upstream plagiatia_backend {
    server 127.0.0.1:3000;
    
    # Keep-alive pour améliorer les performances
    keepalive 64;
    
    # Timeout de connexion au backend
    keepalive_timeout 60s;
    
    # Tentatives en cas d'échec
    max_fails=3;
    fail_timeout=30s;
}

#===============================================================================
# SERVER BLOCK - HTTP → REDIRECT VERS HTTPS
#===============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name plagiatia.aenews.net;
    
    # Logs
    access_log /var/log/nginx/plagiatia_access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/plagiatia_error.log warn;
    
    # ACME Challenge pour Certbot (avant SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
        default_type "application/octet-stream";
    }
    
    # Redirection permanente vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

#===============================================================================
# SERVER BLOCK - HTTPS (Principal)
#===============================================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name plagiatia.aenews.net;
    
    #===========================================================================
    # CERTIFICATS SSL (générés par Certbot)
    #===========================================================================
    
    ssl_certificate /etc/letsencrypt/live/plagiatia.aenews.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plagiatia.aenews.net/privkey.pem;
    
    #===========================================================================
    # CONFIGURATION SSL OPTIMISÉE (A+ SSL Labs)
    #===========================================================================
    
    # Session SSL
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # Protocoles modernes uniquement (TLS 1.2 et 1.3)
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Cipher suites sécurisées (moderne + compatibilité)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # OCSP Stapling pour accélérer la vérification
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    #===========================================================================
    # HEADERS DE SÉCURITÉ
    #===========================================================================
    
    # HSTS - Force HTTPS pendant 2 ans
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Protection contre le clickjacking
    add_header X-Frame-Options "DENY" always;
    
    # Protection MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Protection XSS basique
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Politique de référent
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Restrictions des fonctionnalités (caméra, micro, géolocalisation)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com data:; img-src 'self' data: blob: https://*.aenews.net; connect-src 'self' wss: https://*.aenews.net; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    
    # Logs
    access_log /var/log/nginx/plagiatia_ssl_access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/plagiatia_ssl_error.log warn;
    
    #===========================================================================
    # LOCATIONS
    #===========================================================================
    
    # Page racine et routes Next.js
    location / {
        limit_conn conn_limit;
        
        proxy_pass http://plagiatia_backend;
        include /etc/nginx/snippets/plagiatia-proxy.conf;
        
        # Ne pas cacher les pages dynamiques
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        
        # Security headers for dynamic content
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # API endpoints - Rate limiting strict
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;
        limit_conn conn_limit;
        
        proxy_pass http://plagiatia_backend;
        include /etc/nginx/snippets/plagiatia-proxy.conf;
        
        # Pas de cache pour l'API
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        
        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # Login endpoint - Protection anti brute-force renforcée
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;
        
        proxy_pass http://plagiatia_backend;
        include /etc/nginx/snippets/plagiatia-proxy.conf;
        
        # Délai artificiel en cas de dépassement (anti-timing attacks)
        error_page 429 = @login_rate_limited;
    }
    
    # Upload endpoint - Documents et fichiers
    location /api/documents {
        limit_req zone=upload_limit burst=3 nodelay;
        limit_req_status 429;
        
        # Augmenter la taille max du body pour les uploads (100MB)
        client_max_body_size 100M;
        
        proxy_pass http://plagiatia_backend;
        include /etc/nginx/snippets/plagiatia-proxy.conf;
        
        # Timeout augmentés pour les gros fichiers
        proxy_connect_timeout 120s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
    
    # Assets statiques Next.js - Cache agressif (1 an)
    location /_next/static/ {
        proxy_pass http://plagiatia_backend;
        
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        access_log off;
    }
    
    # Images - Cache 30 jours
    location ~* \.(ico|png|jpg|jpeg|gif|webp|avif|svg)$ {
        proxy_pass http://plagiatia_backend;
        
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header X-Content-Type-Options nosniff;
        access_log off;
    }
    
    # Fonts - Cache 1 an (immutable)
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        proxy_pass http://plagiatia_backend;
        
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
        access_log off;
    }
    
    # Manifest PWA
    location = /manifest.json {
        proxy_pass http://plagiatia_backend;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # Service Worker - Jamais en cache
    location = /sw.js {
        proxy_pass http://plagiatia_backend;
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # Workbox files
    location ~ ^/(sw\.js|workbox-.*\.js)$ {
        proxy_pass http://plagiatia_backend;
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # Robots.txt
    location = /robots.txt {
        proxy_pass http://plagiatia_backend;
        add_header Cache-Control "public, max-age=86400";
    }
    
    # Favicon
    location = /favicon.ico {
        proxy_pass http://plagiatia_backend;
        access_log off;
        log_not_found off;
        expires 7d;
    }
    
    # Health check endpoint (sans logs pour éviter le spam)
    location /api/health {
        proxy_pass http://plagiatia_backend;
        access_log off;
        log_not_found off;
        add_header Cache-Control "no-store";
    }
    
    # Page d'erreur personnalisée
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    # Trop de requêtes sur login
    location @login_rate_limited {
        default_type application/json;
        return 429 '{"error":"Trop de tentatives de connexion. Réessayez dans quelques minutes.","code":"RATE_LIMITED","retryAfter":60}';
    }
}
